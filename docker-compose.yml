version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: venanow_db
    environment:
      POSTGRES_USER: venanow
      POSTGRES_PASSWORD: password
      POSTGRES_DB: venanow_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./models/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U venanow"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: venanow_api
    environment:
      DATABASE_URL: postgresql+asyncpg://venanow:password@db:5432/venanow_db
      DATABASE_URL_SYNC: postgresql://venanow:password@db:5432/venanow_db
    ports:
      - "8000:8000"
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
